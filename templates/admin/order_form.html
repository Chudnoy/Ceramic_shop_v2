{% extends 'admin/base.html' %}

{% block content %}
<h1 class="admin-page-title">Редактирование заказа</h1>

<form method="POST" class="admin-form">
    <div class="admin-form-group">
        <label for="name">Имя</label>
        <input type="text" name="name" id="name" value="{{ order.customer_name }}">
    </div>

    <div class="admin-form-group">
        <label for="email">Email</label>
        <input type="email" name="email" id="email" value="{{ order.customer_email }}">
    </div>

    <div class="admin-form-group">
        <label for="phone">Телефон</label>
        <input type="text" name="phone" id="phone" value="{{ order.customer_phone }}">
    </div>

    <div class="admin-form-group">
        <label for="address">Адрес</label>
        <textarea name="address" id="address" rows="4">{{ order.customer_address if order.customer_address else '' }}</textarea>
    </div>

    <h3>Товары</h3>

    {% for product_id, product in order['items'].items() %}
        <div class="admin-form-group">
            <label for="quantity_{{ product_id }}">
                {{ product['name'] }}
            </label>
            <input type="number"
                   name="quantity_{{ product_id }}"
                   id="quantity_{{ product_id }}"
                   value="{{ product['quantity'] }}"
                   min="1">
        </div>
    {% endfor %}

    <div class="admin-form-group">
        <label for="status">Статус заказа:</label>
        <select name="status" id="status">
        {% for eng_status, rus_status in order_statuses.items() %}
            <option value="{{eng_status}}" {% if order.status == eng_status %}selected{% endif %}>{{rus_status}}</option>
        {% endfor %}
    </select>
    </div>

    <button type="submit" class="admin-button">Сохранить</button>
</form>
{% endblock %}
